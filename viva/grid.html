<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid & Flexbox</title>
    <style>
        body { margin: 0; padding: 20px; font-family: Arial; }
        h2 { margin-top: 0; }
        .flex { display: flex; gap: 10px; margin-bottom: 30px; }
        .flex-item { flex: 1; background: #667eea; color: white; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .grid-item { background: #764ba2; color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <h2>Flexbox</h2>
    <div class="flex">
        <div class="flex-item">Item 1</div>
        <div class="flex-item">Item 2</div>
        <div class="flex-item">Item 3</div>
    </div>
    <h2>CSS Grid</h2>
    <div class="grid">
        <div class="grid-item">A</div>
        <div class="grid-item">B</div>
        <div class="grid-item">C</div>
        <div class="grid-item">D</div>
        <div class="grid-item">E</div>
        <div class="grid-item">F</div>
    </div>
</body>
</html>
