<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        .navbar { background: #333; padding: 10px 20px; }
        .navbar ul { list-style: none; display: flex; gap: 20px; }
        .navbar a { color: white; text-decoration: none; padding: 8px 12px; }
        .navbar a:hover { background: #555; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="navbar">
        <ul>
            <li><img src="home-icon.png" alt="Home"> </li>
            <li><a href="#home">Home</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#services">Services</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
    </div>
</body>
</html>
