<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
    <style>
        body { padding: 20px; font-family: Arial; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border: 1px solid #ddd; }
        th { background: #333; color: white; }
        tr:hover { background: #f5f5f5; }
    </style>
</head>
<body>
    <h2>Student Data</h2>
    <table>
        <tr><th>ID</th><th>Name</th><th>Email</th><th>Grade</th></tr>
        <tr><td>1</td><td>John Doe</td><td>john@email.com</td><td>A</td></tr>
        <tr><td>2</td><td>Jane Smith</td><td>jane@email.com</td><td>A+</td></tr>
        <tr><td>3</td><td>Bob Johnson</td><td>bob@email.com</td><td>B</td></tr>
        <tr><td>4</td><td>Alice Brown</td><td>alice@email.com</td><td>A</td></tr>
    </table>
</body>
</html>
